<!DOCTYPE html>
<html>
<head>
  <title>Weather Advice</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <label for="weather">What’s the weather like? </label>
  <select id="weather">
    <option value="sunny">Sunny</option>
    <option value="windy">Windy</option>
    <option value="rainy">Rainy</option>
    <option value="snowy">Snowy</option>
    <option value="cloudy">Cloudy</option>
  </select>

  <button id="goButton">GO!</button>

  <p id="outputText">Weather advice: </p>

  <script>
    document.getElementById("goButton").addEventListener("click", function() {
      var weatherSelected = document.getElementById("weather").value;
      var advice;

      switch(weatherSelected) {
        case "sunny":
          advice = " - wear your sunglasses.";
          break;
        case "windy":
          advice = " - hold onto your hat!";
          break;
        case "rainy":
          advice = " - don’t forget an umbrella.";
          break;
        case "snowy":
          advice = " - dress warmly and wear boots.";
          break;
        case "cloudy":
          advice = " - it might be a gloomy day.";
          break;
        default:
          advice = " - please select a weather type.";
      }

      document.getElementById("outputText").innerHTML = "Weather advice:" + advice;
    });
  </script>
</body>
</html>
